# aqtinstall configuration for CI (wired up via the AQT_CONFIG env var).
# Based on aqtinstall's default settings.ini, with more patient retry
# behavior: download.qt.io's CDN intermittently 404s the .sha256 files for
# newly published repos, and the defaults (5 retries, 0.1s backoff) give up
# in under a second.

[aqt]
concurrency : 4
baseurl : https://download.qt.io
7zcmd : 7z
print_stacktrace_on_error : False
always_keep_archives : False
archive_download_location : .
min_module_size : 41

[requests]
connection_timeout : 3.5
response_timeout : 30
max_retries_on_connection_error : 8
retry_backoff : 3.0
max_retries_on_checksum_error : 8
max_retries_to_retrieve_hash : 12
hash_algorithm : sha256
INSECURE_NOT_FOR_PRODUCTION_ignore_hash : False

[mirrors]
trusted_mirrors :
    https://download.qt.io
blacklist :
    http://mirrors.ocf.berkeley.edu
    http://mirrors.tuna.tsinghua.edu.cn
    http://mirrors.geekpie.club
fallbacks :
    https://qtproject.mirror.liquidtelecom.com/
    https://mirrors.aliyun.com/qt/
    https://mirrors.ustc.edu.cn/qtproject/
    https://ftp.jaist.ac.jp/pub/qtproject/
    https://ftp.yz.yamagata-u.ac.jp/pub/qtproject/
    https://qt-mirror.dannhauer.de/
    https://ftp.fau.de/qtproject/
    https://mirror.netcologne.de/qtproject/
    https://mirrors.dotsrc.org/qtproject/
    https://www.nic.funet.fi/pub/mirrors/download.qt-project.org/
    https://master.qt.io/
    https://mirrors.ukfast.co.uk/sites/qt.io/
    https://ftp.nluug.nl/languages/qt/
    https://qt.mirror.constant.com/
